name: Deploy Docs to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # No report HTML in the repo (and no Git LFS). The notebooks are the source;
        # their exported bundles live on the HF bucket, synced by `./go publish`.

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Dependencies (for docs build)
        # The build imports mini.store / mini.hf_store, so it needs the project
        # (not just the pages group's markdown).
        run: uv sync --group pages

      - name: Build Site
        # Read-only, deterministic half of publishing: build_site pulls each synced
        # bundle from the bucket, resolves author links against this checkout, inserts
        # one <base href> at exports/<key>/, and writes the HTML into _site. The assets
        # stay on the bucket CDN; the agent did the export+upload (`./go publish`). A
        # read-only HF_TOKEN suffices — this job never writes to the bucket or runs a
        # notebook. (A report not yet published is skipped with a warning, not an error.)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MINI_STORE_BUCKET: ${{ vars.MINI_STORE_BUCKET }}
        run: ./go build

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
